[build]
  # Vite build commands
  command = "npm run build"
  publish = "dist"

[[redirects]]
  # Redirects all frontend routes back to index.html (SPA Fallback)
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  # Cache control for static assets inside Vite's assets folder
  for = "/assets/*"
  [headers.values]
    Cache-Control = """
    public,
    max-age=31536000,
    immutable"""
