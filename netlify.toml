[build]
  # Vite build commands
  command = "npm run build"
  publish = "dist"

[[redirects]]
  # Redirects all frontend routes back to index.html (SPA Fallback)
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  # Cache control for static assets inside Vite's assets folder
  for = "/assets/*"
  [headers.values]
    Cache-Control = """
    public,
    max-age=31536000,
    immutable"""
